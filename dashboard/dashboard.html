<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { font-family: sans-serif; background: #f5f5f5; color: #1a1a1a; }

        .navbar {
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 14px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 { font-size: 18px; font-weight: 600; color: #6c63ff; }

        .navbar-right { display: flex; align-items: center; gap: 16px; }

        .user { font-size: 13px; color: #888; }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: background .2s;
        }

        .btn-primary { background: #6c63ff; color: white; }
        .btn-primary:hover { background: #5a52d5; }
        .btn-danger  { background: #fff0f0; color: #c0392b; border: 1px solid #f5c6cb; }
        .btn-danger:hover { background: #ffe0e0; }
        .btn-logout  { background: none; color: #888; border: 1px solid #ddd; }
        .btn-logout:hover { background: #f5f5f5; }

        .container { max-width: 900px; margin: 32px auto; padding: 0 24px; }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .top-bar h2 { font-size: 20px; font-weight: 600; }

        .table-wrap {
            background: white;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }

        th {
            text-align: left;
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 500;
            color: #888;
            border-bottom: 1px solid #e0e0e0;
            text-transform: uppercase;
            letter-spacing: .04em;
        }

        td {
            padding: 14px 16px;
            font-size: 14px;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: middle;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafafa; }

        .status {
            font-size: 11px;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .status-published { background: #EAF3DE; color: #3B6D11; }
        .status-draft     { background: #F1EFE8; color: #444441; }

        .actions { display: flex; gap: 8px; }

        .empty {
            text-align: center;
            padding: 48px;
            color: #aaa;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 48px;
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <h1>My CMS</h1>
        <div class="navbar-right">
            <span class="user" id="username"></span>
            <button class="btn btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="top-bar">
            <h2>All Articles</h2>
            <button class="btn btn-primary" onclick="window.location.href='editor.html'">
                + New Article
            </button>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr><td colspan="4" class="loading">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API   = 'http://localhost/cms-api/public/api';
        const token = localStorage.getItem('token');
        const user  = JSON.parse(localStorage.getItem('user') || '{}');

        // Redirect to login if not authenticated
        if (!token) window.location.href = 'index.html';

        // Show username in navbar
        document.getElementById('username').textContent = user.name || '';

        // Load all articles on page load
        async function loadContents() {
            try {
                const res  = await fetch(`${API}/contents`);
                const data = await res.json();
                renderTable(data.data);
            } catch (err) {
                document.getElementById('tbody').innerHTML =
                    '<tr><td colspan="4" class="empty">Could not load articles</td></tr>';
            }
        }

        function renderTable(contents) {
            const tbody = document.getElementById('tbody');

            if (!contents || contents.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty">No articles yet — create your first one!</td></tr>';
                return;
            }

            tbody.innerHTML = contents.map(c => `
                <tr>
                    <td><strong>${c.title}</strong></td>
                    <td>
                        <span class="status status-${c.status}">${c.status}</span>
                    </td>
                    <td>${new Date(c.created_at).toLocaleDateString()}</td>
                    <td>
                        <div class="actions">
                            <button class="btn btn-primary"
                                onclick="window.location.href='editor.html?id=${c.id}'">
                                Edit
                            </button>
                            <button class="btn btn-danger"
                                onclick="deleteContent(${c.id})">
                                Delete
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function deleteContent(id) {
            if (!confirm('Delete this article?')) return;

            await fetch(`${API}/contents/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            // Reload the table
            loadContents();
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        loadContents();
    </script>
</body>
</html>
